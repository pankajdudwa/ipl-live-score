<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/overlay/overlay.css">
</head>

<body>
    <div class="overlay"> <!-- Team 1 -->
        <div class="team team1"> <img id="team1Logo" src="" alt="Team1 Logo">
            <div class="team-info">
                <h2 id="team1Name">TEAM 1</h2>
                <p id="team1Score">0/0 (0.0)</p>
            </div>
        </div> <!-- Center Score -->
        <div class="center">
            <div class="batsman">
                <p id="batsman1">Batsman 1</p> <span id="batsman1Stats">0(0)</span>
            </div>
            <div class="batsman">
                <p id="batsman2">Batsman 2</p> <span id="batsman2Stats">0(0)</span>
            </div>
            <div class="bowler">
                <p>Bowler</p> <span id="bowler">Bowler Name</span>
            </div>
            <div class="runrate">
                <p>RR: <span id="runRate">0.00</span></p>
                <p>Innings: <span id="innings">1</span></p>
            </div>
        </div> <!-- Team 2 -->
        <div class="team team2"> <img id="team2Logo" src="" alt="Team2 Logo">
            <div class="team-info">
                <h2 id="team2Name">TEAM 2</h2>
                <p id="team2Score">0/0 (0.0)</p>
            </div>
        </div>
    </div>

<script type="module" src="/overlay/overlay.js"></script>
</body>

</html>
