<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>🏏 IPL Live Control Panel</h1> <!-- Team Section -->
        <div class="team-section">
            <div class="team">
                <h2>Team 1</h2> <input type="text" id="team1Name" placeholder="Team 1 Name"> <input type="file"
                    id="team1Logo">
                <p>Score: <span id="score1">0</span>/<span id="wickets1">0</span></p>
                <p>Overs: <span id="overs1">0.0</span></p>
            </div>
            <div class="team">
                <h2>Team 2</h2> <input type="text" id="team2Name" placeholder="Team 2 Name"> <input type="file"
                    id="team2Logo">
                <p>Score: <span id="score2">0</span>/<span id="wickets2">0</span></p>
                <p>Overs: <span id="overs2">0.0</span></p>
            </div>
        </div> <!-- Players Section -->
        <div class="players">
            <h2>Players</h2> <input type="text" id="batsman1" placeholder="Batsman 1"> <input type="text" id="batsman2"
                placeholder="Batsman 2"> <input type="text" id="bowler" placeholder="Bowler">
        </div> <!-- Score Buttons -->
        <div class="buttons">
            <h2>Scoring</h2>
            <div class="row"> <button onclick="addRun(1)">+1</button> <button onclick="addRun(2)">+2</button> <button
                    onclick="addRun(3)">+3</button> </div>
            <div class="row"> <button onclick="addRun(4)">+4</button> <button onclick="addRun(6)">+6</button> <button
                    onclick="dotBall()">Dot</button> </div>
            <div class="row"> <button onclick="wideBall()">Wide</button> <button onclick="noBall()">No Ball</button>
                <button onclick="wicket()">Wicket</button> </div>
        </div> <!-- Match Info -->
        <div class="match-info">
            <h2>Match Info</h2>
            <p>Run Rate: <span id="runRate">0.00</span></p>
            <p>Match Timer: <span id="timer">00:00</span></p> <button onclick="switchInnings()">Switch Innings</button>
            <button onclick="resetMatch()">Reset Match</button>
        </div>
    </div>

    <script type="module" src="firebase.js"></script>
    <script type="module" src="script.js"></script>
</body>

</html>
